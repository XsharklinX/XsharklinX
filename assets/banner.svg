<svg width="1774" height="520" viewBox="0 0 1774 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">David Bonilla GitHub Profile Banner</title>
  <desc id="desc">Dark blue developer banner with code-inspired layout</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1774" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.52" stop-color="#08111f"/>
      <stop offset="1" stop-color="#0B3B82"/>
    </linearGradient>
    <linearGradient id="line" x1="220" y1="0" x2="1550" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38BDF8" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#38BDF8" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1774" height="520" fill="url(#bg)"/>
  <rect width="1774" height="520" fill="url(#grid)" opacity="0.7"/>
  <path d="M0 422C210 360 351 475 573 417C793 360 812 223 1044 282C1295 346 1390 238 1774 170" stroke="url(#line)" stroke-width="2" opacity="0.55"/>
  <path d="M0 456C235 392 357 495 602 443C848 391 871 290 1089 330C1313 371 1428 296 1774 246" stroke="url(#line)" stroke-width="1" opacity="0.32"/>

  <!-- left code block -->
  <g transform="translate(92 82)" opacity="0.88" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="22">
    <text x="0" y="0" fill="#475569">01</text><text x="54" y="0" fill="#38BDF8">const</text><text x="128" y="0" fill="#E2E8F0"> developer = {</text>
    <text x="0" y="46" fill="#475569">02</text><text x="54" y="46" fill="#94A3B8">name:</text><text x="132" y="46" fill="#22C55E"> 'David Bonilla'</text><text x="326" y="46" fill="#E2E8F0">,</text>
    <text x="0" y="92" fill="#475569">03</text><text x="54" y="92" fill="#94A3B8">location:</text><text x="178" y="92" fill="#22C55E"> 'Mao, RD'</text><text x="306" y="92" fill="#E2E8F0">,</text>
    <text x="0" y="138" fill="#475569">04</text><text x="54" y="138" fill="#94A3B8">roles:</text><text x="144" y="138" fill="#22C55E"> ['GameDev', 'App Developer']</text><text x="500" y="138" fill="#E2E8F0">,</text>
    <text x="0" y="184" fill="#475569">05</text><text x="54" y="184" fill="#94A3B8">focus:</text><text x="144" y="184" fill="#22C55E"> 'clean, useful software'</text><text x="458" y="184" fill="#E2E8F0">,</text>
    <text x="0" y="230" fill="#475569">06</text><text x="54" y="230" fill="#E2E8F0">};</text>
  </g>

  <!-- main title -->
  <g filter="url(#glow)">
    <text x="887" y="230" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="100" font-weight="800" fill="#F8FAFC" letter-spacing="-4">David Bonilla</text>
    <text x="887" y="304" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#38BDF8" letter-spacing="6">GAMEDEV  ·  DESARROLLADOR DE APPS</text>
    <text x="887" y="362" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="27" fill="#CBD5E1">Mao, República Dominicana</text>
  </g>

  <line x1="570" y1="392" x2="1204" y2="392" stroke="url(#line)" stroke-width="2" opacity="0.55"/>
  <circle cx="887" cy="392" r="5" fill="#38BDF8" filter="url(#glow)"/>

  <!-- right UI card -->
  <g transform="translate(1320 116)">
    <rect x="0" y="0" width="330" height="245" rx="24" fill="#020617" fill-opacity="0.25" stroke="#38BDF8" stroke-opacity="0.38"/>
    <circle cx="34" cy="32" r="5" fill="#38BDF8" opacity="0.9"/>
    <circle cx="55" cy="32" r="5" fill="#38BDF8" opacity="0.45"/>
    <circle cx="76" cy="32" r="5" fill="#38BDF8" opacity="0.25"/>
    <rect x="32" y="72" width="185" height="12" rx="6" fill="#38BDF8" opacity="0.85"/>
    <rect x="32" y="104" width="260" height="8" rx="4" fill="#93C5FD" opacity="0.35"/>
    <rect x="32" y="128" width="230" height="8" rx="4" fill="#93C5FD" opacity="0.22"/>
    <rect x="32" y="152" width="280" height="8" rx="4" fill="#93C5FD" opacity="0.16"/>
    <rect x="32" y="192" width="92" height="14" rx="7" fill="#38BDF8" opacity="0.65"/>
    <rect x="140" y="192" width="92" height="14" rx="7" fill="#2563EB" opacity="0.55"/>
  </g>

  <!-- bottom chips -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#E2E8F0">
    <rect x="640" y="438" width="150" height="42" rx="21" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.36"/>
    <text x="715" y="466" text-anchor="middle">React</text>
    <rect x="812" y="438" width="150" height="42" rx="21" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.36"/>
    <text x="887" y="466" text-anchor="middle">Tauri</text>
    <rect x="984" y="438" width="150" height="42" rx="21" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.36"/>
    <text x="1059" y="466" text-anchor="middle">Rust</text>
  </g>
</svg>
